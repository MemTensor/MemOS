<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>方案 C · 实时仪表盘 — 系统总览 demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="demo-frame">
    <div class="demo-banner">
      <div class="demo-banner__title">
        <span class="badge">DEMO</span>
        方案 C · 实时仪表盘
      </div>
      <nav class="demo-banner__nav">
        <a href="index.html">三方案对比</a>
        <a href="option-a.html">A</a>
        <a href="option-b.html">B</a>
        <a class="is-active" href="option-c.html">C</a>
        <span class="demo-banner__theme" id="theme-toggle"></span>
      </nav>
    </div>

    <div id="overview-header"></div>

    <section class="card">
      <div class="card__header">
        <div>
          <h3 class="card__title">实时活动</h3>
        </div>
      </div>

      <div id="dash" class="dash-grid"></div>
    </section>
  </div>

  <script src="shared.js"></script>
  <script>
    const { renderIcon, CAT, decorate,
            buildMockEvents, relativeTime, fmtClock, escapeHtml,
            renderOverviewHeader, installThemeToggle } = window.DEMO;

    installThemeToggle(document.getElementById("theme-toggle"));
    renderOverviewHeader(document.getElementById("overview-header"));

    let allEvents = buildMockEvents().map(decorate);

    // Six categories that map to product-facing concepts. Order is row-major
    // for the 2 × 3 grid:
    //   row 1 → 记忆     · 经验    · 环境认知
    //   row 2 → 技能     · 检索    · 反馈
    const TILE_CATS = ["memory", "policy", "world", "skill", "retrieval", "feedback"];
    const BUCKET_COUNT = 30;
    const BUCKET_MS = 10_000;

    function buildTileData(cat) {
      const now = Date.now();
      const buckets = new Array(BUCKET_COUNT).fill(0);
      let count = 0, last = null;
      for (const e of allEvents) {
        if (e.cat !== cat) continue;
        const idx = BUCKET_COUNT - 1 - Math.floor((now - e.ts) / BUCKET_MS);
        if (idx >= 0 && idx < BUCKET_COUNT) {
          buckets[idx]++;
          count++;
          if (!last || e.ts > last.ts) last = e;
        }
      }
      return { buckets, count, last };
    }

    function sparklinePath(buckets) {
      const max = Math.max(1, ...buckets);
      const w = 100, h = 28;
      const stepX = w / (buckets.length - 1);
      const points = buckets.map((v, i) => {
        const x = (i * stepX).toFixed(2);
        const y = (h - (v / max) * (h - 4) - 2).toFixed(2);
        return `${x},${y}`;
      });
      const linePath = "M" + points.join(" L");
      const areaPath = `${linePath} L${w},${h} L0,${h} Z`;
      return { linePath, areaPath };
    }

    function renderDash() {
      const dash = document.getElementById("dash");
      dash.innerHTML = TILE_CATS.map((cat) => {
        const meta = CAT[cat];
        const { buckets, count, last } = buildTileData(cat);
        const { linePath, areaPath } = sparklinePath(buckets);
        const lastBlock = last
          ? `<strong>${escapeHtml(last.title)}</strong>${escapeHtml(last.detail)} · ${relativeTime(last.ts)}`
          : `<span style="color:var(--fg-dim)">最近 5 分钟无事件</span>`;
        return `
          <div class="dash-tile cat--${cat}" data-cat="${cat}">
            <div class="dash-tile__head">
              <div class="dash-tile__icon">${renderIcon(meta.icon)}</div>
              <div class="dash-tile__name">${meta.name}</div>
            </div>
            <div class="dash-tile__count">
              <span class="dash-tile__count-n" style="color:var(--cat)">${count}</span>
              <span class="dash-tile__count-unit">最近 5 分钟事件</span>
            </div>
            <div class="dash-tile__spark">
              <svg viewBox="0 0 100 28" preserveAspectRatio="none">
                <path d="${areaPath}" fill="var(--cat)" fill-opacity="0.14"/>
                <path d="${linePath}" fill="none" stroke="var(--cat)" stroke-width="1.4"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="dash-tile__last">${lastBlock}</div>
          </div>
        `;
      }).join("");
    }

    renderDash();

    // Simulate a steady event stream so the demo "feels" alive — the
    // matching tile flashes when its category receives a new event.
    const SIM_TYPES = [
      "trace.created", "retrieval.tier1.hit", "feedback.classified",
      "l2.candidate_added", "skill.eta_updated", "reward.computed",
      "l2.associated", "retrieval.triggered", "skill.crystallized",
      "l3.abstracted",
    ];
    const SIM_PAYLOAD = {
      "trace.created":         () => ({ traceId: "tr_" + rand(), episodeId: "ep_a1c2" }),
      "retrieval.triggered":   () => ({ sessionId: "sess_8x32" }),
      "retrieval.tier1.hit":   () => ({ count: 3 + Math.floor(Math.random()*7), ms: 30 + Math.floor(Math.random()*60) }),
      "feedback.classified":   () => ({ tone: ["satisfied","neutral","puzzled"][Math.floor(Math.random()*3)] }),
      "l2.candidate_added":    () => ({ signature: "sig-" + rand() }),
      "l2.associated":         () => ({ policyId: "pol_" + rand(), similarity: +(0.4+Math.random()*0.55).toFixed(2) }),
      "skill.eta_updated":     () => ({ skillId: "sk_" + rand() }),
      "skill.crystallized":    () => ({ skillId: "sk_" + rand() }),
      "reward.computed":       () => ({ rHuman: +(Math.random()).toFixed(2), source: "implicit" }),
      "l3.abstracted":         () => ({ worldModelId: "wm_" + rand() }),
    };
    function rand() { return Math.random().toString(36).slice(2, 6); }

    let injected = 0;
    setInterval(() => {
      const type = SIM_TYPES[Math.floor(Math.random() * SIM_TYPES.length)];
      const evt = decorate({
        seq: 1000 + (++injected), ts: Date.now(), type, payload: SIM_PAYLOAD[type](),
      });
      allEvents.push(evt);
      const cutoff = Date.now() - 6 * 60 * 1000;
      allEvents = allEvents.filter((e) => e.ts >= cutoff);
      renderDash();
    }, 4_500);
  </script>
</body>
</html>
