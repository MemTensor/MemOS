<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>方案 B · 活跃节奏 + 友好事件流 — 系统总览 demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="demo-frame">
    <div class="demo-banner">
      <div class="demo-banner__title">
        <span class="badge">DEMO</span>
        方案 B · 活跃节奏 + 友好事件流（推荐）
      </div>
      <nav class="demo-banner__nav">
        <a href="index.html">三方案对比</a>
        <a href="option-a.html">A</a>
        <a class="is-active" href="option-b.html">B</a>
        <a href="option-c.html">C</a>
        <span class="demo-banner__theme" id="theme-toggle"></span>
      </nav>
    </div>

    <div id="overview-header"></div>

    <section class="card">
      <div class="card__header">
        <div>
          <h3 class="card__title">实时活动</h3>
          <p class="card__subtitle">最近 5 分钟的脉搏节奏，下面是逐条事件。</p>
        </div>
        <div class="card__actions">
          <span style="font-size:var(--fs-xs);color:var(--fg-muted)">悬停柱条可看那一刻发生了什么</span>
        </div>
      </div>

      <div class="pulse">
        <div id="pulse-legend" class="pulse__legend"></div>
        <div class="pulse__strip">
          <div id="pulse-bars" class="pulse__bars"></div>
        </div>
        <div class="pulse__axis">
          <span>5 分钟前</span>
          <span>4 分钟前</span>
          <span>3 分钟前</span>
          <span>2 分钟前</span>
          <span>1 分钟前</span>
          <span>刚刚</span>
        </div>
      </div>

      <div id="feed" class="feed" role="log" aria-live="polite"></div>
    </section>
  </div>

  <script src="shared.js"></script>
  <script>
    const { renderIcon, CAT, TYPE2CAT, decorate,
            buildMockEvents, relativeTime, fmtClock,
            renderOverviewHeader, installThemeToggle } = window.DEMO;

    installThemeToggle(document.getElementById("theme-toggle"));
    renderOverviewHeader(document.getElementById("overview-header"));

    let allEvents = buildMockEvents().map(decorate);

    // ── Pulse strip: bin events into 30 buckets (10s each) over the
    //    last 5 minutes, stacked by category.
    const BUCKET_COUNT = 30;
    const BUCKET_MS = 10_000;
    const CAT_ORDER = ["session", "memory", "policy", "world", "skill", "retrieval", "feedback", "system"];

    function renderPulse() {
      const now = Date.now();
      const buckets = Array.from({ length: BUCKET_COUNT }, () =>
        Object.fromEntries(CAT_ORDER.map((c) => [c, 0]))
      );
      for (const e of allEvents) {
        const ageBuckets = Math.floor((now - e.ts) / BUCKET_MS);
        const idx = BUCKET_COUNT - 1 - ageBuckets; // 0 = oldest, last = newest
        if (idx >= 0 && idx < BUCKET_COUNT) buckets[idx][e.cat]++;
      }
      const max = Math.max(1, ...buckets.map((b) =>
        CAT_ORDER.reduce((s, c) => s + b[c], 0)
      ));

      const bars = document.getElementById("pulse-bars");
      bars.innerHTML = buckets.map((b) => {
        const total = CAT_ORDER.reduce((s, c) => s + b[c], 0);
        if (total === 0) return `<div class="pulse__bar"></div>`;
        const segs = CAT_ORDER
          .filter((c) => b[c] > 0)
          .map((c) => {
            const h = (b[c] / max) * 100;
            return `<div class="pulse__bar-seg cat--${c}" style="height:${h}%"></div>`;
          }).join("");
        const tip = CAT_ORDER.filter((c) => b[c] > 0)
          .map((c) => `${CAT[c].name} ${b[c]}`).join("·");
        return `<div class="pulse__bar" title="${tip}">${segs}</div>`;
      }).join("");

      // Legend with running 5-minute counts.
      const totalsByCat = Object.fromEntries(CAT_ORDER.map((c) => [c, 0]));
      for (const b of buckets) for (const c of CAT_ORDER) totalsByCat[c] += b[c];
      const legend = document.getElementById("pulse-legend");
      legend.innerHTML = CAT_ORDER
        .filter((c) => totalsByCat[c] > 0)
        .map((c) => `
          <span class="pulse__chip cat--${c}">
            <span class="pulse__chip-dot"></span>
            ${CAT[c].name} ${totalsByCat[c]}
          </span>
        `).join("");
    }

    // ── Friendly feed (last 12 events, narrative tone) ─────────────
    function renderFeed() {
      const recent = [...allEvents]
        .sort((a, b) => b.ts - a.ts)
        .slice(0, 12);
      const feed = document.getElementById("feed");
      feed.innerHTML = recent.map((e) => `
        <div class="feed__item cat--${e.cat} ${e.tone !== "info" ? "tone--" + e.tone : ""}"
             role="button" tabindex="0"
             data-seq="${e.seq}"
             title="${e.type}\n${fmtClock(e.ts)}\n${escapeHtml(JSON.stringify(e.payload, null, 2))}">
          <div class="feed__icon">${renderIcon(e.icon)}</div>
          <div class="feed__main">
            <div class="feed__title">
              <span>${e.title}</span>
              <span class="feed__cat">${CAT[e.cat].name}</span>
            </div>
            <div class="feed__detail">${e.detail}</div>
            <div class="feed__raw">${escapeHtml(JSON.stringify(e.payload, null, 2))}</div>
          </div>
          <div class="feed__time" data-ts="${e.ts}">${relativeTime(e.ts)}</div>
        </div>
      `).join("");
    }

    document.getElementById("feed").addEventListener("click", (ev) => {
      const item = ev.target.closest(".feed__item");
      if (item) item.classList.toggle("is-open");
    });

    renderPulse();
    renderFeed();

    // Refresh time labels.
    setInterval(() => {
      document.querySelectorAll(".feed__time").forEach((el) => {
        el.textContent = relativeTime(Number(el.dataset.ts));
      });
    }, 10_000);

    // Simulate a fresh event every ~5s.
    const SIM_TYPES = [
      "trace.created", "retrieval.tier1.hit", "feedback.classified",
      "l2.candidate_added", "skill.eta_updated", "reward.computed",
      "l2.associated", "retrieval.triggered",
    ];
    const SIM_PAYLOAD = {
      "trace.created":         () => ({ traceId: "tr_" + rand(), episodeId: "ep_a1c2" }),
      "retrieval.triggered":   () => ({ sessionId: "sess_8x32" }),
      "retrieval.tier1.hit":   () => ({ count: 3 + Math.floor(Math.random()*7), ms: 30 + Math.floor(Math.random()*60) }),
      "feedback.classified":   () => ({ tone: ["satisfied","neutral","puzzled"][Math.floor(Math.random()*3)] }),
      "l2.candidate_added":    () => ({ signature: "sig-" + rand() }),
      "l2.associated":         () => ({ policyId: "pol_" + rand(), similarity: +(0.4+Math.random()*0.55).toFixed(2) }),
      "skill.eta_updated":     () => ({ skillId: "sk_" + rand() }),
      "reward.computed":       () => ({ rHuman: +(Math.random()).toFixed(2), source: "implicit" }),
    };
    function rand() { return Math.random().toString(36).slice(2, 6); }

    let injected = 0;
    setInterval(() => {
      const type = SIM_TYPES[Math.floor(Math.random() * SIM_TYPES.length)];
      const evt = decorate({
        seq: 1000 + (++injected), ts: Date.now(), type, payload: SIM_PAYLOAD[type](),
      });
      allEvents.push(evt);
      // Drop events older than 6 minutes so the pulse stays bounded.
      const cutoff = Date.now() - 6 * 60 * 1000;
      allEvents = allEvents.filter((e) => e.ts >= cutoff);
      renderPulse();
      renderFeed();
    }, 5_000);

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
  </script>
</body>
</html>
