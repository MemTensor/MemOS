name: MemOS Local Plugin — Pre-Merge Dry Run

on:
  push:
    branches:
      - "docs-sync/**"
    paths:
      - ".github/workflows/memos-local-plugin-publish.yml"
      - ".github/workflows/memos-local-plugin-pre-merge-dry-run.yml"
      - ".github/workflows/memos-local-plugin-post-merge-dry-run.yml"
      - ".github/scripts/draft-local-plugin-release-notes.mjs"
      - ".github/scripts/draft-local-plugin-release-notes.test.mjs"
      - ".github/scripts/validate-release-confirmation.mjs"
      - ".github/scripts/validate-release-confirmation.test.mjs"
      - ".github/scripts/retry.sh"
      - "apps/memos-local-plugin/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  dry-run:
    if: ${{ github.repository == 'MemTensor/MemOS' }}
    uses: ./.github/workflows/memos-local-plugin-publish.yml
    with:
      version: "2.0.10"
      tag: "latest"
      git_ref: ""
      release_notes: ""
      dry_run: true
      recover_existing_npm_release: false
    secrets: inherit
